<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign In | Smart Canteen</title>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="shortcut icon" href="{% static 'assets/img/icons/icon-48x48.png' %}" />
    <link href="{% static 'assets/css/app.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            /* ✅ Minimal Gradient Background */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
        }
        .card {
            border: none;
            border-radius: 16px;
            /* ✅ Slightly stronger shadow for the gradient background */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1) !important;
            background: rgba(255, 255, 255, 0.95); /* Semi-transparent for elegance */
        }
        .btn-primary {
            background-color: #222e3c;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #3b7ddd;
            transform: translateY(-1px);
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25 margin-toprem rgba(59, 125, 221, 0.1);
        }
    </style>
</head>

<body>
    <main class="d-flex w-100">
       <div class="container d-flex flex-column">
          <div class="row vh-100">
             <div class="col-sm-10 col-md-7 col-lg-4 mx-auto d-table h-100">
                <div class="d-table-cell align-middle">

                   <div class="text-center mb-4">
                      <h1 class="h2 fw-bold text-dark">Smart Canteen</h1>
                      <p class="text-muted">Management Portal</p>
                   </div>

                   <div class="card">
                      <div class="card-body p-4">
                         <div class="m-sm-3">

                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-danger alert-dismissible fade show small" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <form method="POST" action="{% url 'admin_login' %}">
                               {% csrf_token %}
                               <div class="mb-4">
                                  <label class="form-label fw-bold">Username</label>
                                  <input class="form-control" type="text" name="username" placeholder="Username" required />
                               </div>
                               <div class="mb-4">
                                  <label class="form-label fw-bold">Password</label>
                                  <input class="form-control" type="password" name="password" placeholder="••••••••" required />
                               </div>
                               <div class="text-center mt-3">
                                   <button type="submit" class="btn btn-primary w-100">Log In</button>
                               </div>
                            </form>
                         </div>
                      </div>
                   </div>

                </div>
             </div>
          </div>
       </div>
    </main>

    <script src="{% static 'assets/js/app.js' %}"></script>
</body>
</html>
