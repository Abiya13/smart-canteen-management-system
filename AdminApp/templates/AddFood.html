{% extends 'Dashboard.html' %}
{% block content %}

<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-md-12">

      <div class="card shadow-sm">
        <div class="card-body">

          <h4 class="card-title mb-1">Add Food</h4>
          <p class="text-muted mb-4">Enter food details</p>

          <form method="POST"
                action="{% url 'save_food' %}"
                enctype="multipart/form-data">

            {% csrf_token %}

            <!-- Category -->
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select name="category" class="form-control" required>
                <option value="">-- Select Category --</option>
                {% for c in categories %}
                  <option value="{{ c.id }}">{{ c.category_name }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- Food Name -->
            <div class="mb-3">
              <label class="form-label">Food Name</label>
              <input type="text"
                     name="food_name"
                     class="form-control"
                     placeholder="Eg: Chicken Burger"
                     required>
            </div>

            <!-- Price -->
            <div class="mb-3">
              <label class="form-label">Price (₹)</label>
              <input type="number"
                     name="price"
                     class="form-control"
                     placeholder="Eg: 120"
                     required>
            </div>

            <!-- Image -->
            <div class="mb-3">
              <label class="form-label">Food Image</label>
              <input type="file" name="food_image" class="form-control">
            </div>

            <!-- Availability -->
            <div class="mb-3">
              <label class="form-label">Availability</label>
              <select name="availability" class="form-control">
                <option value="Available">Available</option>
                <option value="Out of Stock">Out of Stock</option>
              </select>
            </div>
            <!-- Description -->
            <div class="mb-4">
              <label class="form-label">Description</label>
              <textarea name="description"
                        class="form-control"
                        rows="4"
                        placeholder="Food description"></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Save Food
              </button>
              <a href="{% url 'view_food' %}" class="btn btn-secondary">
                Cancel
              </a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
